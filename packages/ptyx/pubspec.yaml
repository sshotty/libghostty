name: ptyx
description: High-throughput local pseudo-terminal sessions for Dart.
version: 0.0.1
repository: https://github.com/elias8/libghostty/tree/main/packages/ptyx
resolution: workspace

platforms:
  android:
  linux:
  macos:
  windows:

topics:
  - terminal
  - pty
  - ffi
  - native-assets

environment:
  sdk: ^3.11.0

dependencies:
  code_assets: ^1.0.0
  crypto: ^3.0.7
  ffi: ^2.2.0
  hooks: ^2.0.2
  meta: ^1.16.0

dev_dependencies:
  ffigen: ^20.1.1
  logging: ^1.3.0
  path: ^1.9.1
  test: ^1.25.6
